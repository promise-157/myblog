title: Hexo
subtitle: ''
description: ''
keywords: null
author: John Doe
language: en
timezone: ''
url: https://promise-157.github.io/myblog
root: /myblog/
permalink: ':year/:month/:day/:title/'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: 'blog'  # 仅修改这一行，文章的 URL 依然保持原样
  per_page: 10
  order_by: '-sticky -date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null
theme: icarus
deploy:
  type: git
  repo: https://github.com/promise-157/myblog.git
  branch: gh-pages
markdown_it:
  render:
    html: true
    xhtmlOut: false
    breaks: true
  plugins:
    - name: markdown-it-toc-and-anchor
      options:
        anchorClassName: 'anchor'
    - name: markdown-it-attrs
      options:
        leftDelimiter: '{'
        rightDelimiter: '}'
        allowedAttributes: []
# 文章加密配置
encrypt:
  abstract: "这是一篇加密文章，请输入密码访问。"
  message: "输入密码，开启隐藏内容："
  tags:
    - {name: private, password: "123456"} # 只要文章标签含 private，就会用这个密码
  wrong_pass_message: "密码错误，请重试。"
  wrong_hash_message: "内容校验失败。"

widgets:
  -
    type: profile # 个人信息
    position: left
  -
    type: categories # 分类（层级管理）
    position: left
  -
    type: toc # 目录（长文管理必备）
    position: right
    index: true
    collapsed: false # 是否默认折叠
  -
    type: recent_posts # 最近文章
    position: right

# 标准 JSON 内容配置
